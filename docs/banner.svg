<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" font-family="Georgia, 'Songti SC', serif">
  <defs>
    <radialGradient id="spot" cx="50%" cy="22%" r="62%">
      <stop offset="0%" stop-color="#e8b04b" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#e8b04b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111a2b"/>
      <stop offset="100%" stop-color="#05070c"/>
    </linearGradient>
    <radialGradient id="vig" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
    </radialGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0c674"/>
      <stop offset="100%" stop-color="#e8b04b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="url(#spot)"/>

  <!-- suspect silhouette under the spotlight -->
  <g transform="translate(600,150)" opacity="0.9">
    <circle r="66" fill="#3b5b8c"/>
    <circle r="70" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
    <text y="22" text-anchor="middle" font-size="62" fill="#0c0f16" font-weight="700">陈</text>
  </g>

  <!-- title -->
  <text x="600" y="300" text-anchor="middle" font-size="86" letter-spacing="26" fill="#e8ecf2">盘　问</text>
  <text x="600" y="338" text-anchor="middle" font-size="22" letter-spacing="14" fill="#e8b04b" font-family="Segoe UI, system-ui, sans-serif">THE&#160;&#160;INTERROGATION</text>
  <text x="600" y="378" text-anchor="middle" font-size="18" fill="#97a1b2" font-family="Segoe UI, 'PingFang SC', system-ui, sans-serif">审讯由大模型实时驱动的嫌疑人 · 用证据击破谎言 · 一个 AI-native 推理探案 H5</text>

  <!-- left chat bubble -->
  <g transform="translate(120,120)" font-family="Segoe UI, 'PingFang SC', system-ui, sans-serif">
    <rect width="250" height="64" rx="14" fill="#1c212d" stroke="#ffffff" stroke-opacity="0.09"/>
    <text x="18" y="28" font-size="15" fill="#e8ecf2">案发时你在哪里？</text>
    <text x="18" y="50" font-size="13" fill="#97a1b2">—— 你向陈志远发问</text>
  </g>

  <!-- right "objection" bubble -->
  <g transform="translate(830,210)" font-family="Segoe UI, 'PingFang SC', system-ui, sans-serif">
    <rect width="270" height="64" rx="14" fill="rgba(229,72,77,0.14)" stroke="#e5484d" stroke-opacity="0.45"/>
    <text x="18" y="28" font-size="15" fill="#ffd9da" font-weight="700">🔨 击破谎言！</text>
    <text x="18" y="50" font-size="13" fill="#ffd9da">通话记录显示电话 22:15 就挂断了</text>
  </g>

  <rect width="1200" height="420" fill="url(#vig)"/>
</svg>
